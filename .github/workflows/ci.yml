# CI complet : lint + tests -> build -> push
# Sur PR     : lint + tests uniquement (pas de push)
# Sur master : lint + tests puis build & push arm64 si tout passe
name: CI & Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".vscode/**"
      - ".idea/**"
  pull_request:
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".vscode/**"
      - ".idea/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ══════════════════════════════════════════════
  # Job 1 — Lint + Tests unitaires
  # Tourne sur push ET pull_request
  # ══════════════════════════════════════════════
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Linter (Biome)
        run: pnpm lint

      - name: Tests unitaires (Vitest)
        run: pnpm test
        env:
          RESEND_API_KEY: test_resend_key
          CONTACT_EMAIL: test@example.com

  # ══════════════════════════════════════════════
  # Job 2 — Build & Push Docker
  # Tourne uniquement sur push master, après les tests
  # ══════════════════════════════════════════════
  build-and-push:
    name: Build & Push Docker (arm64)
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short
            type=raw,value={{date 'YYYY-MM-DD'}}

      - name: Login sur GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build et push (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
