name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize]

jobs:
  # --- Review et merge automatique des PRs Dependabot ----------------------
  claude-dependabot-review:
    if: |
      github.event_name == 'pull_request' &&
      github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Installer les dependances
        id: install
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Build
        id: build
        if: steps.install.outcome == 'success'
        run: pnpm build
        continue-on-error: true

      - name: Tests
        id: test
        if: steps.install.outcome == 'success'
        run: pnpm test
        continue-on-error: true
        env:
          RESEND_API_KEY: test_resend_key
          CONTACT_EMAIL: test@example.com

      - name: Audit de securite
        id: audit
        if: steps.install.outcome == 'success'
        run: pnpm audit --json > /tmp/audit.json 2>&1 || true

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Cette PR #${{ github.event.pull_request.number }} est proposee par Dependabot.

            Resultats :
            - Installation : ${{ steps.install.outcome }}
            - Build        : ${{ steps.build.outcome }}
            - Tests        : ${{ steps.test.outcome }}

            Lis le rapport d'audit : cat /tmp/audit.json

            Stack du projet : Next.js 16 App Router, React 19, TypeScript strict, Tailwind CSS v4, Vitest, Playwright, Biome, Zod v4, Resend.

            Analyse la compatibilite (breaking changes, changelogs, vulnerabilites).

            Decide :
            - Mineure/patch OK => label "claude-reviewed", commentaire, merge squash
            - Majeure sans breaking bloquant => labels "major-update,claude-reviewed", commentaire, issue, pas de merge
            - Echec build/tests ou breaking bloquant => labels "blocked,claude-reviewed", commentaire, issue, fermer la PR

            Reponds en francais, de facon concise.

  # --- Job invoque via @claude ---------------------------------------------
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
