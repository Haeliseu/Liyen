services:
  container_name: liyen
  liyen:
    image: ghcr.io/haeliseu/liyen:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - RESEND_API_KEY=${RESEND_API_KEY}
    networks:
      - haeliseu_network

networks:
  haeliseu_network:
    external: true
