# Test local uniquement — NE PAS committer de secrets ici
# Usage : docker compose -f docker-compose.local.yml up --build
# Suppression : docker compose -f docker-compose.local.yml down --rmi local

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BASE_URL=http://localhost:3000
      # Optionnel : copier .env.local ici pour tester les emails
